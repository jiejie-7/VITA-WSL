env:
  env_name: smac
  map_name: MMM2
  max_steps: 400

train:
  nprocesses: 8
  num_epochs: 250
  epoch_size: 10
  batch_size: 500
  seed: 1
  gamma: 0.99
  lrate: 0.0007
  entr: 0.01
  value_coeff: 0.01
  mean_ratio: 1.0
  recurrent: true
  rnn_type: LSTM
  detach_gap: 10

eval:
  eval_interval: 25
  eval_episodes: 32

model:
  hid_size: 128
  commnet: true
  tarcomm: true
  comm_passes: 2
  comm_sight_range: 999
  max_neighbors: 9

noise:
  obs_noise_std: 0.0
  packet_drop_prob: 0.0
  malicious_agent_prob: 0.0
  malicious_obs_noise_scale: 0.0
  malicious_obs_mode: add
  noise_warmup_steps: 0
  obs_noise_normalize: false

comm_noise:
  comm_noise_std: 0.0
  comm_packet_drop_prob: 0.0
  comm_malicious_agent_prob: 0.0
  comm_malicious_noise_scale: 0.0
  comm_malicious_mode: bernoulli
  comm_malicious_fixed_agent_id: 0

run:
  save: true
  run_dir: /home/jiejie/VITA/runs/MMM2/clean/TarMAC

